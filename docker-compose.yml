services:
  db:
    image: postgres:16-alpine
    container_name: hotel_postgres
    restart: always
    environment:
      POSTGRES_DB: hoteldb
      POSTGRES_USER: hoteluser
      POSTGRES_PASSWORD: hotelpass
    ports:
      - "5433:5432"   
    volumes:
      - hotel_pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: hotel_bot
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://hoteluser:hotelpass@db:5432/hoteldb
    env_file:
      - .env
    ports:
      - "8501:8501"
    command: uv run streamlit run frontend/chat_app.py --server.address=0.0.0.0

volumes:
  hotel_pgdata: